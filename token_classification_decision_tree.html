<svg width="100%" viewBox="0 0 680 960" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="24" text-anchor="middle" style="font-size:15px">Where does your token land?</text>
<text class="ts" x="340" y="42" text-anchor="middle">Classification under SEC/CFTC Release No. 33-11412 (Mar. 17, 2026)</text>

<g class="c-gray">
<rect x="90" y="62" width="500" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="82" text-anchor="middle" dominant-baseline="central">Is it a financial instrument within the statutory definition</text>
<text class="th" x="340" y="100" text-anchor="middle" dominant-baseline="central">of "security" (stock, bond, note, etc.) represented onchain?</text>
</g>
<text class="ts" x="340" y="132" text-anchor="middle" style="font-style:italic">15 U.S.C. §77b(a)(1) · Release §III.E p.23</text>

<line x1="210" y1="118" x2="120" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="148" y="138" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="470" y1="118" x2="470" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="486" y="142" style="font-weight:500">No</text>

<g class="c-red">
<rect x="30" y="162" width="190" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="182" text-anchor="middle" dominant-baseline="central">Digital security</text>
<text class="ts" x="125" y="200" text-anchor="middle" dominant-baseline="central">IS a security · p.23</text>
</g>

<g class="c-gray">
<rect x="300" y="162" width="340" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="470" y="188" text-anchor="middle" dominant-baseline="central">Designed to maintain stable value (e.g., pegged to USD)?</text>
</g>

<line x1="380" y1="206" x2="200" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="272" y="224" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="540" y1="206" x2="540" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="556" y="230" style="font-weight:500">No</text>

<g class="c-amber">
<rect x="60" y="250" width="280" height="62" rx="8" stroke-width="0.5"/>
<text class="th" x="200" y="270" text-anchor="middle" dominant-baseline="central">Stablecoin</text>
<text class="ts" x="200" y="288" text-anchor="middle" dominant-baseline="central">GENIUS Act permitted issuers: NOT a security</text>
<text class="ts" x="200" y="304" text-anchor="middle" dominant-baseline="central">Others depend on facts &amp; structure · §III.D p.21</text>
</g>

<g class="c-gray">
<rect x="370" y="250" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="270" text-anchor="middle" dominant-baseline="central">Does the token have exercisable utility</text>
<text class="th" x="510" y="288" text-anchor="middle" dominant-baseline="central">on a live system? (gas, staking, governance)</text>
</g>
<text class="ts" x="510" y="320" text-anchor="middle" style="font-style:italic">p.14 n.49: "functional" = usable per programmatic utility</text>

<line x1="440" y1="306" x2="300" y2="362" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="332" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="580" y1="306" x2="580" y2="362" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="596" y="338" style="font-weight:500">No</text>

<g class="c-green">
<rect x="140" y="364" width="320" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="300" y="384" text-anchor="middle" dominant-baseline="central">Digital commodity</text>
<text class="ts" x="300" y="402" text-anchor="middle" dominant-baseline="central">NOT a security · §III.A p.14</text>
<text class="ts" x="300" y="420" text-anchor="middle" dominant-baseline="central">Strengthened where no person or group has</text>
<text class="ts" x="300" y="436" text-anchor="middle" dominant-baseline="central">operational, economic, or voting control (p.16 n.50)</text>
</g>

<g class="c-gray">
<rect x="490" y="364" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="575" y="384" text-anchor="middle" dominant-baseline="central">Collected or used?</text>
<text class="ts" x="575" y="404" text-anchor="middle" dominant-baseline="central">(Art, memes, in-game)</text>
</g>

<line x1="530" y1="420" x2="430" y2="488" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="464" y="452" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="620" y1="420" x2="620" y2="488" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="636" y="456" style="font-weight:500">No</text>

<g class="c-gray">
<rect x="330" y="490" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="430" y="516" text-anchor="middle" dominant-baseline="central">Is it fractionalized?</text>
</g>

<line x1="380" y1="534" x2="300" y2="576" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="324" y="554" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="480" y1="534" x2="480" y2="576" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="496" y="556" style="font-weight:500">No</text>

<g class="c-amber">
<rect x="210" y="578" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="300" y="598" text-anchor="middle" dominant-baseline="central">May be a security</text>
<text class="ts" x="300" y="616" text-anchor="middle" dominant-baseline="central">Consult counsel · p.19–20</text>
</g>

<g class="c-teal">
<rect x="410" y="578" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="598" text-anchor="middle" dominant-baseline="central">Digital collectible</text>
<text class="ts" x="500" y="616" text-anchor="middle" dominant-baseline="central">NOT a security · §III.B p.16</text>
</g>

<g class="c-gray">
<rect x="540" y="490" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="605" y="510" text-anchor="middle" dominant-baseline="central">Practical function?</text>
<text class="ts" x="605" y="530" text-anchor="middle" dominant-baseline="central">(Ticket, credential)</text>
</g>

<line x1="572" y1="546" x2="510" y2="666" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="524" y="606" text-anchor="middle" style="font-weight:500">Yes</text>
<line x1="638" y1="546" x2="638" y2="666" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="650" y="606" style="font-weight:500">No</text>

<g class="c-teal">
<rect x="420" y="668" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="688" text-anchor="middle" dominant-baseline="central">Digital tool</text>
<text class="ts" x="510" y="706" text-anchor="middle" dominant-baseline="central">NOT a security · §III.C p.20</text>
</g>

<g class="c-gray">
<rect x="558" y="668" width="110" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="613" y="688" text-anchor="middle" dominant-baseline="central">Hybrid / unclear</text>
<text class="ts" x="613" y="706" text-anchor="middle" dominant-baseline="central">Counsel · p.13</text>
</g>

<rect x="40" y="746" width="600" height="130" rx="8" fill="#F5F1EB" stroke="none"/>
<text class="th" x="60" y="768">Key: what happens after classification?</text>
<text class="ts" x="60" y="790">Non-security crypto assets can still be sold subject to an investment contract if the issuer makes</text>
<text class="ts" x="60" y="808">pre-sale representations promising essential managerial efforts from which purchasers would</text>
<text class="ts" x="60" y="826">expect profits. The token is not the security; the transaction is. The token can later separate</text>
<text class="ts" x="60" y="844">(§IV.B, p.28–31). But until separation, secondary market transactions in the token</text>
<text class="ts" x="60" y="862" style="font-style:italic">remain securities transactions (§IV.A, p.27–28).</text>

<line x1="40" y1="896" x2="640" y2="896" stroke="#D4CFC7" stroke-width="0.5"/>
<text class="ts" x="340" y="916" text-anchor="middle" style="font-style:italic">Release: sec.gov/files/rules/interp/2026/33-11412.pdf · Not legal advice. Classification is fact-specific.</text>
<text class="ts" x="340" y="934" text-anchor="middle">Irina Marinescu · Code &amp; Counsel · codeandcounsel.substack.com</text>
</svg>
